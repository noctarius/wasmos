name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Zig is needed even by the unit-tests configure (native gfx-compositor /
  # font-service services require it). The version only matters where Zig code is
  # actually compiled (the defconfig builds), not for the unit-tests configure.
  ZIG_VERSION: "0.14.1"
  TINYGO_VERSION: "0.34.0"

jobs:
  unit-tests:
    name: Kernel unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install host toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld llvm cmake ninja-build python3-pip curl xz-utils
          python3 -m pip install --user kconfiglib

      - name: Install Zig
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install AssemblyScript
        # asc is required at configure time (AssemblyScript serial driver);
        # rustc is preinstalled on the runner; TinyGo skips gracefully.
        run: |
          npm install
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -S . -B build

      - name: Run kernel unit tests
        run: cmake --build build --target run-kernel-unit-tests

  defconfig:
    name: ${{ matrix.config }} (build + boot)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [warp_single, warp_smp, wasm3_single, wasm3_smp]
    env:
      # Generous timeout: the harness auto-uses KVM when /dev/kvm is available
      # (fast); the value mainly guards a TCG fallback.
      WASMOS_QEMU_TEST_TIMEOUT: "600"
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm || echo "no /dev/kvm (will fall back to TCG)"

      - name: Install build + emulation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld llvm cmake ninja-build python3-pip \
            qemu-system-x86 ovmf curl xz-utils
          python3 -m pip install --user kconfiglib

      - name: Install Zig
        # Zig 0.14.1+ uses the zig-<arch>-<os>-<version> tarball naming.
        run: |
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install TinyGo
        run: |
          curl -fsSLO "https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb"
          sudo dpkg -i "tinygo_${TINYGO_VERSION}_amd64.deb"

      - name: Install AssemblyScript
        run: |
          npm install
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Stage OVMF (writable vars copy)
        # Ubuntu's ovmf package ships OVMF_CODE_4M.fd / OVMF_VARS_4M.fd, which the
        # CMake autodiscovery list does not know about, and the vars file must be
        # writable for QEMU. Copy a matched pair to a writable location.
        run: |
          mkdir -p "$RUNNER_TEMP/ovmf"
          code=$(ls /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd 2>/dev/null | head -1)
          vars=$(ls /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd 2>/dev/null | head -1)
          echo "OVMF code=$code vars=$vars"
          cp "$code" "$RUNNER_TEMP/ovmf/OVMF_CODE.fd"
          cp "$vars" "$RUNNER_TEMP/ovmf/OVMF_VARS.fd"
          chmod u+w "$RUNNER_TEMP/ovmf/OVMF_VARS.fd"

      - name: Tool versions
        run: |
          clang --version | head -1; ld.lld --version | head -1
          qemu-system-x86_64 --version | head -1
          zig version; rustc --version; tinygo version || true
          asc --version || true

      - name: Configure (${{ matrix.config }})
        run: |
          cmake -S . -B "build-${{ matrix.config }}" \
            -DWASMOS_DOTCONFIG="configs/${{ matrix.config }}_defconfig" \
            -DWASMOS_QEMU_TEST_TIMEOUT="${WASMOS_QEMU_TEST_TIMEOUT}" \
            -DOVMF_CODE="$RUNNER_TEMP/ovmf/OVMF_CODE.fd" \
            -DOVMF_VARS="$RUNNER_TEMP/ovmf/OVMF_VARS.fd"

      - name: Build + boot test (${{ matrix.config }})
        run: cmake --build "build-${{ matrix.config }}" --target run-qemu-test
