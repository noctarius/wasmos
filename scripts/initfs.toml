version = 1

[boot]
bootstrap_modules = [
  "chardev-client",
  "init-smoke",
  "native-call-min",
  "native-call-smoke",
  "ata",
  "fs-fat",
  "serial",
  "framebuffer",
  "hw-discovery",
]

[sysinit]
spawn = [
  "chardev-client",
  "cli",
]

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "apps/chardev_client.wap"
source = "chardev_client.wap"

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "apps/init_smoke.wap"
source = "init_smoke.wap"

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "apps/native_call_min.wap"
source = "native_call_min.wap"

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "apps/native_call_smoke.wap"
source = "native_call_smoke.wap"

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "system/drivers/ata.wap"
source = "ata.wap"

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "system/drivers/fs_fat.wap"
source = "fs_fat.wap"

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "system/drivers/serial.wap"
source = "serial.wap"

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "system/drivers/framebuffer.wap"
source = "framebuffer.wap"

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "system/drivers/keyboard.wap"
source = "keyboard.wap"

[[entries]]
kind = "wasmos_app"
flags = ["bootstrap"]
path = "system/services/hw_discovery.wap"
source = "hw_discovery.wap"

[[entries]]
kind = "config"
path = "config/bootcfg.bin"
generated = "boot_config"
